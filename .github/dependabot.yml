version: 2

updates:
  - package-ecosystem: npm
    directory: /gui/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /gui/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
