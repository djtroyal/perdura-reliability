version: 2

updates:
  - package-ecosystem: npm
    directory: /gui/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    # Update exact resolved versions without converting API lower bounds into
    # rolling latest-version floors.
    versioning-strategy: lockfile-only
    open-pull-requests-limit: 5
    groups:
      scientific-stack:
        patterns: [numpy, scipy, matplotlib, pandas, scikit-learn]
        update-types:
          - minor
          - patch
      onnx-stack:
        patterns: [onnx, onnxruntime, skl2onnx]
        update-types:
          - minor
          - patch
      application-stack:
        patterns: [fastapi, uvicorn, pydantic, pyinstaller, setuptools]
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
