version: 2

updates:
  - package-ecosystem: npm
    directory: /gui/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    # Dependency floors are compatibility policy, not rolling lock versions.
    versioning-strategy: increase-if-necessary
    exclude-paths:
      - ci/constraints-min.txt
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /gui/backend
    schedule:
      interval: weekly
    # Keep a declared floor when it already permits the available release.
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
