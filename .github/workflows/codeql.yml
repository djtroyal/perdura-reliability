name: CodeQL

# Static security analysis for the Python library/backend and the TypeScript
# frontend. Results appear under Security → Code scanning. Read-only: this
# workflow never modifies code and cannot block merges on its own.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '20 7 * * 1'   # weekly, Monday 07:20 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
