name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-lock:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.29'
          enable-cache: true

      - name: Verify dependency lock is current
        run: uv lock --check

  python:
    runs-on: ubuntu-24.04
    needs: dependency-lock
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.29'
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install the locked test environment
        run: uv sync --locked --python '${{ matrix.python-version }}' --extra app --group dev

      - name: Verify Perdura version declarations
        run: uv run --no-sync python tools/check_version_consistency.py

      - name: Run library tests
        run: uv run --no-sync pytest tests

      - name: Run backend tests
        run: uv run --no-sync pytest gui/backend/tests

      - name: Validate scientific assurance inventory
        run: uv run --no-sync python tools/check_model_assurance.py

      - name: Run Crow-AMSAA independent validation profile
        run: uv run --no-sync python tools/crow_amsaa_validation.py --profile pr

      - name: Backend import smoke test
        run: uv run --no-sync python tools/check_locked_environment.py

  release-environment:
    name: Locked release environment (${{ matrix.target }})
    needs: dependency-lock
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: windows-2025
            target: windows-x64
          - os: macos-15
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.29'
          enable-cache: false

      - name: Install uv-managed Python 3.11.15
        run: uv python install 3.11.15

      # The first cold, build-disabled sync proves every third-party dependency
      # has a published wheel for the real release target. The second sync adds
      # only the local editable Perdura project to that already-validated env.
      - name: Install locked release environment from wheels
        run: |
          uv sync --locked --managed-python --python '3.11.15' --extra app --group release --no-dev --no-install-project --no-build --no-cache
          uv sync --locked --managed-python --python '3.11.15' --extra app --group release --no-dev --no-cache

      - name: Validate native imports and ONNX inference
        run: uv run --no-sync python tools/check_locked_environment.py --expected-target '${{ matrix.target }}'

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix gui/frontend

      - name: Build frontend (tsc + Vite)
        run: npm run build --prefix gui/frontend

      - name: Run frontend scientific contract tests
        run: |
          npm run test:plot-markup --prefix gui/frontend
          npm run test:plotly-interop --prefix gui/frontend
          npm run test:hypothesis-overview --prefix gui/frontend
          npm run test:growth-contracts --prefix gui/frontend
          npm run test:mcf-contracts --prefix gui/frontend
          npm run test:reliability-testing-state --prefix gui/frontend
          npm run test:modeling-workflow-state --prefix gui/frontend
          npm run test:help-center --prefix gui/frontend
          npm run test:prediction-report-assets --prefix gui/frontend
          npm run test:fault-tree-contracts --prefix gui/frontend
          npm run test:rbd-contracts --prefix gui/frontend
          npm run test:markov-contracts --prefix gui/frontend
          npm run test:markov-canvas-state --prefix gui/frontend
          npm run test:latex-formulas --prefix gui/frontend
