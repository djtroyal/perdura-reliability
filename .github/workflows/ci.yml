name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install library deps
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
          pip install -r gui/backend/requirements.txt

      - name: Run library tests
        run: pytest tests

      - name: Run backend tests
        run: pytest gui/backend/tests

      - name: Validate scientific assurance inventory
        run: python tools/check_model_assurance.py

      - name: Run Crow-AMSAA independent validation profile
        run: python tools/crow_amsaa_validation.py --profile pr

      - name: Backend import smoke test
        run: cd gui/backend && python -c "from main import app"

  # Verify the declared dependency floors actually build and pass, rather than
  # only ever testing the latest resolved versions. Installs the exact minimum
  # of each dependency via ci/constraints-min.txt (kept in sync with the >=
  # floors in pyproject.toml / gui/backend/requirements.txt).
  min-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies at their floors
        run: |
          pip install --upgrade pip
          pip install -e .[dev] -c ci/constraints-min.txt
          pip install -r gui/backend/requirements.txt -c ci/constraints-min.txt

      - name: Run library tests
        run: pytest tests

      - name: Run backend tests
        run: pytest gui/backend/tests

      - name: Backend import smoke test
        run: cd gui/backend && python -c "from main import app"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix gui/frontend

      - name: Build frontend (tsc + Vite)
        run: npm run build --prefix gui/frontend

      - name: Run frontend scientific contract tests
        run: |
          npm run test:plot-markup --prefix gui/frontend
          npm run test:plotly-interop --prefix gui/frontend
          npm run test:hypothesis-overview --prefix gui/frontend
          npm run test:growth-contracts --prefix gui/frontend
          npm run test:mcf-contracts --prefix gui/frontend
          npm run test:reliability-testing-state --prefix gui/frontend
          npm run test:modeling-workflow-state --prefix gui/frontend
