name: CI

# Runs the test suites and the frontend type-check/build on every push to main
# and every pull request. Also exposed as a reusable workflow (workflow_call) so
# the release pipeline can gate on it before building artifacts.
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install -r gui/backend/requirements.txt

      - name: Library test suite
        run: pytest tests

      - name: Backend test suite
        run: pytest gui/backend/tests

      - name: Backend import smoke check
        working-directory: gui/backend
        run: python -c "from main import app"

  frontend:
    name: Frontend build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install & build (tsc type-check + Vite build)
        working-directory: gui/frontend
        run: |
          npm ci
          npm run build
