name: Sync companion website resources

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: perdura-website-resources
  cancel-in-progress: true

jobs:
  sync:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Check website GitHub App configuration
        id: configured
        shell: bash
        env:
          APP_CLIENT_ID: ${{ vars.PERDURA_WEBSITE_APP_CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.PERDURA_WEBSITE_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$APP_CLIENT_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          else
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            echo '::warning::Website synchronization is disabled. Configure PERDURA_WEBSITE_APP_CLIENT_ID and PERDURA_WEBSITE_APP_PRIVATE_KEY.'
          fi

      - name: Download the validated resource bundle
        if: steps.configured.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RESOURCE_NAME: Perdura-website-resources-${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run download "$RUN_ID" --name "$RESOURCE_NAME" --dir generated-resources

      - name: Create a repository-scoped GitHub App token
        if: steps.configured.outputs.enabled == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.PERDURA_WEBSITE_APP_CLIENT_ID }}
          private-key: ${{ secrets.PERDURA_WEBSITE_APP_PRIVATE_KEY }}
          owner: djtroyal
          repositories: perdura-website
          permission-contents: write
          permission-pull-requests: write

      - name: Check out the companion website
        if: steps.configured.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          repository: djtroyal/perdura-website
          token: ${{ steps.app-token.outputs.token }}
          path: website

      - name: Replace generated resources and metadata
        if: steps.configured.outputs.enabled == 'true'
        shell: bash
        run: |
          find website/public/screenshots -maxdepth 1 -type f -name '*.png' -delete
          cp generated-resources/screenshots/*.png website/public/screenshots/
          cp generated-resources/screenshots.generated.json website/src/data/screenshots.generated.json
          mkdir -p website/public/website-resources
          cp generated-resources/build-provenance.json website/public/website-resources/
          cp generated-resources/diff-report.json website/public/website-resources/
          cp generated-resources/SHA256SUMS website/public/website-resources/

      - name: Validate the companion website build
        if: steps.configured.outputs.enabled == 'true'
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Open or update the rolling website-resource pull request
        if: steps.configured.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: website
          branch: automation/perdura-screenshots
          delete-branch: true
          commit-message: 'chore: sync Perdura product screenshots'
          title: 'chore: sync generated Perdura product screenshots'
          body: |
            Automated, deterministic product resources generated by Perdura CI.

            Source commit: `${{ github.event.workflow_run.head_sha }}`
            Source workflow: ${{ github.event.workflow_run.html_url }}

            The bundle includes per-image SHA-256 hashes, build provenance,
            an inventory manifest, and an informative visual-difference report.
          labels: automated,product-screenshots
          base: main
