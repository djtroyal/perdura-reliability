name: Build & Release

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v0.1.0, v1.0.0, etc.
  workflow_dispatch:     # Manual trigger from the Actions tab
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  crow-assurance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.29'
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install uv-managed Python 3.11.15
        run: uv python install 3.11.15

      - name: Install locked scientific dependencies
        run: uv sync --locked --managed-python --python '3.11.15' --no-dev

      - name: Validate assurance inventory structure
        run: uv run --no-sync python tools/check_model_assurance.py

      - name: Run certification-eligible Crow-AMSAA validation
        run: uv run --no-sync python tools/crow_amsaa_validation.py --profile release --output crow-amsaa-release-validation.json

      - uses: actions/upload-artifact@v7
        with:
          name: Crow-AMSAA-validation
          path: crow-amsaa-release-validation.json
          retention-days: 30

  build:
    needs: [test, crow-assurance]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            artifact: Perdura-linux
            zip_name: Perdura-linux-x64.tar.gz
            manifest: Perdura-dependencies-linux-x64.json
            archive_cmd: tar -czf
          - os: windows-2025
            target: windows-x64
            artifact: Perdura-windows
            zip_name: Perdura-windows-x64.zip
            manifest: Perdura-dependencies-windows-x64.json
            archive_cmd: ''    # handled below with powershell
          - os: macos-15
            target: macos-arm64
            artifact: Perdura-macos
            zip_name: Perdura-macos-arm64.tar.gz
            manifest: Perdura-dependencies-macos-arm64.json
            archive_cmd: tar -czf

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.29'
          enable-cache: false

      - name: Install uv-managed Python 3.11.15
        run: uv python install 3.11.15

      # ── Resolve the release version from the tag (or dispatch input) and
      #    require source/package metadata to match it exactly ─────────────
      - name: Resolve version
        id: ver
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REF="$DISPATCH_TAG"
          else
            REF="$REF_NAME"
          fi
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z form; got: $REF" >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$REF^{commit}" >/dev/null; then
            TAG_COMMIT="$(git rev-parse "refs/tags/$REF^{commit}")"
            BUILD_COMMIT="$(git rev-parse HEAD)"
            if [ "$TAG_COMMIT" != "$BUILD_COMMIT" ]; then
              echo "Existing tag $REF does not identify the commit being built." >&2
              exit 1
            fi
          fi
          VERSION="${REF#v}"
          uv run --no-project --managed-python --python 3.11.15 python tools/check_version_consistency.py --expected "${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Perdura ${VERSION}"

      # ── Node (build frontend) ──────────────────────────────────────
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend deps & build
        working-directory: gui/frontend
        env:
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          npm ci
          npm run build

      - name: Install locked release environment from wheels
        run: |
          uv sync --locked --managed-python --python '3.11.15' --extra app --group release --no-dev --no-install-project --no-build --no-cache
          uv sync --locked --managed-python --python '3.11.15' --extra app --group release --no-dev --no-cache

      - name: Record and validate release dependencies
        run: uv run --no-sync python tools/check_locked_environment.py --expected-target '${{ matrix.target }}' --output '${{ matrix.manifest }}'

      # ── PyInstaller ────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: uv run --no-sync pyinstaller perdura.spec

      # ── Archive ────────────────────────────────────────────────────
      - name: Archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.archive_cmd }} ${{ matrix.zip_name }} -C dist Perdura

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\Perdura -DestinationPath ${{ matrix.zip_name }}

      # ── Upload build artifact ──────────────────────────────────────
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.zip_name }}
            ${{ matrix.manifest }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$REF_NAME"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z form; got: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Perdura ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            Perdura-linux-x64.tar.gz
            Perdura-windows-x64.zip
            Perdura-macos-arm64.tar.gz
            Perdura-dependencies-linux-x64.json
            Perdura-dependencies-windows-x64.json
            Perdura-dependencies-macos-arm64.json
            crow-amsaa-release-validation.json
