name: Build & Release

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v0.1.0, v1.0.0, etc.
  workflow_dispatch:     # Manual trigger from the Actions tab
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  actions: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  crow-assurance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Resolve assurance artifact name
        id: assurance
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then REF="$DISPATCH_TAG"; else REF="$REF_NAME"; fi
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z form; got: $REF" >&2
            exit 1
          fi
          echo "file=Perdura-${REF#v}-crow-amsaa-validation.json" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.29'
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install uv-managed Python 3.11.15
        run: uv python install 3.11.15

      - name: Install locked scientific dependencies
        run: uv sync --locked --managed-python --python '3.11.15' --no-dev

      - name: Validate assurance inventory structure
        run: uv run --no-sync python tools/check_model_assurance.py

      - name: Run certification-eligible Crow-AMSAA validation
        run: uv run --no-sync python tools/crow_amsaa_validation.py --profile release --output '${{ steps.assurance.outputs.file }}'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: Perdura-Crow-AMSAA-validation-${{ steps.assurance.outputs.version }}
          path: ${{ steps.assurance.outputs.file }}
          retention-days: 30

  build:
    needs: [test, crow-assurance]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            artifact: Perdura-linux
            archive_cmd: tar -czf
          - os: windows-2025
            target: windows-x64
            artifact: Perdura-windows
            archive_cmd: ''    # handled below with powershell
          - os: macos-15
            target: macos-arm64
            artifact: Perdura-macos
            archive_cmd: tar -czf

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Download consolidated CI verification report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-CI-evidence-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-evidence

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.29'
          enable-cache: false

      - name: Install uv-managed Python 3.11.15
        run: uv python install 3.11.15

      # ── Resolve the release version from the tag (or dispatch input) and
      #    require source/package metadata to match it exactly ─────────────
      - name: Resolve version
        id: ver
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            REF="$DISPATCH_TAG"
          else
            REF="$REF_NAME"
          fi
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z form; got: $REF" >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$REF^{commit}" >/dev/null; then
            TAG_COMMIT="$(git rev-parse "refs/tags/$REF^{commit}")"
            BUILD_COMMIT="$(git rev-parse HEAD)"
            if [ "$TAG_COMMIT" != "$BUILD_COMMIT" ]; then
              echo "Existing tag $REF does not identify the commit being built." >&2
              exit 1
            fi
          fi
          VERSION="${REF#v}"
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release commit must be contained in main." >&2
            exit 1
          fi
          uv run --no-project --managed-python --python 3.11.15 python tools/check_version_consistency.py --expected "${VERSION}"
          BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          VERIFY_SHA="$(python -c 'import hashlib, pathlib; print(hashlib.sha256(pathlib.Path("ci-evidence/verification-report.json").read_bytes()).hexdigest())')"
          VERIFY_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python tools/stamp_build.py --commit "$(git rev-parse HEAD)" --timestamp "$BUILD_TIMESTAMP" --verification-report-sha256 "$VERIFY_SHA" --verification-run-url "$VERIFY_URL"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=${BUILD_TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "verification_sha256=${VERIFY_SHA}" >> "$GITHUB_OUTPUT"
          echo "verification_run_url=${VERIFY_URL}" >> "$GITHUB_OUTPUT"
          echo "manifest=Perdura-${VERSION}-dependencies-${{ matrix.target }}.json" >> "$GITHUB_OUTPUT"
          echo "cyclonedx=Perdura-${VERSION}-sbom-${{ matrix.target }}.cdx.json" >> "$GITHUB_OUTPUT"
          echo "spdx=Perdura-${VERSION}-sbom-${{ matrix.target }}.spdx.json" >> "$GITHUB_OUTPUT"
          if [ '${{ runner.os }}' = 'Windows' ]; then
            echo "archive=Perdura-${VERSION}-${{ matrix.target }}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "archive=Perdura-${VERSION}-${{ matrix.target }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi
          echo "Building Perdura ${VERSION}"

      # ── Node (build frontend) ──────────────────────────────────────
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend deps & build
        working-directory: gui/frontend
        env:
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}
          VITE_APP_COMMIT: ${{ steps.ver.outputs.commit }}
          VITE_BUILD_TIMESTAMP: ${{ steps.ver.outputs.built_at }}
          VITE_BUILD_VERIFICATION_REPORT_SHA256: ${{ steps.ver.outputs.verification_sha256 }}
          VITE_BUILD_VERIFICATION_RUN_URL: ${{ steps.ver.outputs.verification_run_url }}
        run: |
          npm ci
          npm run build

      - name: Install locked release environment from wheels
        run: |
          uv sync --locked --managed-python --python '3.11.15' --extra app --group release --no-dev --no-install-project --no-build --no-cache
          uv sync --locked --managed-python --python '3.11.15' --extra app --group release --no-dev --no-cache

      - name: Record and validate release dependencies
        run: uv run --no-sync python tools/check_locked_environment.py --expected-target '${{ matrix.target }}' --output '${{ steps.ver.outputs.manifest }}'

      # ── PyInstaller ────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: uv run --no-sync pyinstaller perdura.spec

      # ── Archive ────────────────────────────────────────────────────
      - name: Archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.archive_cmd }} ${{ steps.ver.outputs.archive }} -C dist Perdura

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\Perdura -DestinationPath ${{ steps.ver.outputs.archive }}

      - name: Build release-specific CycloneDX and SPDX SBOMs
        run: >-
          uv run --no-sync python tools/build_release_sbom.py
          --environment '${{ steps.ver.outputs.manifest }}'
          --package-lock gui/frontend/package-lock.json
          --subject '${{ steps.ver.outputs.archive }}'
          --version '${{ steps.ver.outputs.version }}'
          --commit '${{ steps.ver.outputs.commit }}'
          --created '${{ steps.ver.outputs.built_at }}'
          --cyclonedx-output '${{ steps.ver.outputs.cyclonedx }}'
          --spdx-output '${{ steps.ver.outputs.spdx }}'

      # ── Upload build artifact ──────────────────────────────────────
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}-${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.ver.outputs.archive }}
            ${{ steps.ver.outputs.manifest }}
            ${{ steps.ver.outputs.cyclonedx }}
            ${{ steps.ver.outputs.spdx }}
          retention-days: 5

  release-evidence:
    needs: [test, crow-assurance, build]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Resolve release version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then REF="$DISPATCH_TAG"; else REF="$REF_NAME"; fi
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z form; got: $REF" >&2
            exit 1
          fi
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux build evidence
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-linux-${{ steps.version.outputs.version }}
          path: release-input

      - name: Download Windows build evidence
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-windows-${{ steps.version.outputs.version }}
          path: release-input

      - name: Download macOS build evidence
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-macos-${{ steps.version.outputs.version }}
          path: release-input

      - name: Download release scientific assurance
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-Crow-AMSAA-validation-${{ steps.version.outputs.version }}
          path: release-input

      - name: Download consolidated CI evidence
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-CI-evidence-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-evidence

      - name: Assemble release verification evidence
        shell: bash
        run: |
          SUBJECT_ARGS=()
          shopt -s nullglob
          for path in release-input/Perdura-*; do
            SUBJECT_ARGS+=(--subject "$path")
          done
          python tools/build_verification_evidence.py release \
            --ci-report ci-evidence/verification-report.json \
            --output release-evidence \
            --archive Perdura-${{ steps.version.outputs.version }}-verification-evidence.zip \
            --repository '${{ github.repository }}' --commit '${{ github.sha }}' \
            --version '${{ steps.version.outputs.version }}' \
            --run-id '${{ github.run_id }}' \
            --run-url '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${SUBJECT_ARGS[@]}"

      - name: Upload release verification evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Perdura-verification-evidence-${{ steps.version.outputs.version }}
          path: |
            Perdura-${{ steps.version.outputs.version }}-verification-evidence.zip
            Perdura-${{ steps.version.outputs.version }}-verification-evidence.zip.sha256
            release-evidence/Perdura-${{ steps.version.outputs.version }}-release-verification.html
            release-evidence/Perdura-${{ steps.version.outputs.version }}-release-verification.json
          retention-days: 90

  release:
    needs: [build, release-evidence]
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
          else
            TAG="$REF_NAME"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use stable vX.Y.Z form; got: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download Linux release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-linux-${{ steps.tag.outputs.version }}
          path: .

      - name: Download Windows release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-windows-${{ steps.tag.outputs.version }}
          path: .

      - name: Download macOS release files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-macos-${{ steps.tag.outputs.version }}
          path: .

      - name: Download Crow-AMSAA release assurance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-Crow-AMSAA-validation-${{ steps.tag.outputs.version }}
          path: .

      - name: Download release verification evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Perdura-verification-evidence-${{ steps.tag.outputs.version }}
          path: .

      - name: Attest released binaries and verification evidence
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            Perdura-*-linux-x64.tar.gz
            Perdura-*-windows-x64.zip
            Perdura-*-macos-arm64.tar.gz
            Perdura-*-dependencies-*.json
            Perdura-*-sbom-*.cdx.json
            Perdura-*-sbom-*.spdx.json
            Perdura-*-crow-amsaa-validation.json
            Perdura-*-verification-evidence.zip

      - name: Attach Linux SBOM attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: Perdura-${{ steps.tag.outputs.version }}-linux-x64.tar.gz
          sbom-path: Perdura-${{ steps.tag.outputs.version }}-sbom-linux-x64.spdx.json

      - name: Attach Windows SBOM attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: Perdura-${{ steps.tag.outputs.version }}-windows-x64.zip
          sbom-path: Perdura-${{ steps.tag.outputs.version }}-sbom-windows-x64.spdx.json

      - name: Attach macOS SBOM attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: Perdura-${{ steps.tag.outputs.version }}-macos-arm64.tar.gz
          sbom-path: Perdura-${{ steps.tag.outputs.version }}-sbom-macos-arm64.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Perdura ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            Perdura-*-linux-x64.tar.gz
            Perdura-*-windows-x64.zip
            Perdura-*-macos-arm64.tar.gz
            Perdura-*-dependencies-linux-x64.json
            Perdura-*-dependencies-windows-x64.json
            Perdura-*-dependencies-macos-arm64.json
            Perdura-*-sbom-*.cdx.json
            Perdura-*-sbom-*.spdx.json
            Perdura-*-crow-amsaa-validation.json
            Perdura-*-verification-evidence.zip
            Perdura-*-verification-evidence.zip.sha256
            release-evidence/Perdura-*-release-verification.html
            release-evidence/Perdura-*-release-verification.json
