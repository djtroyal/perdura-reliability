name: Build & Release

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v0.1.0, v1.0.0, etc.
  workflow_dispatch:     # Manual trigger from the Actions tab
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write        # Needed to create releases and upload assets

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: Perdura-linux
            zip_name: Perdura-linux-x64.tar.gz
            archive_cmd: tar -czf
          - os: windows-latest
            artifact: Perdura-windows
            zip_name: Perdura-windows-x64.zip
            archive_cmd: ''    # handled below with powershell
          - os: macos-latest
            artifact: Perdura-macos
            zip_name: Perdura-macos-arm64.tar.gz
            archive_cmd: tar -czf

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      # ── Resolve the release version from the tag (or dispatch input) and
      #    stamp it so every build target reports the same number ──────────
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.tag }}"
          else
            REF="${{ github.ref_name }}"
          fi
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # The backend / packaged desktop app read reliability.__version__.
          printf '__version__ = "%s"\n' "${VERSION}" > src/reliability/_version.py
          echo "Building Perdura ${VERSION}"

      # ── Node (build frontend) ──────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend deps & build
        working-directory: gui/frontend
        env:
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          npm ci
          npm run build

      # ── Python ─────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install -r gui/backend/requirements.txt
          pip install pyinstaller

      # ── PyInstaller ────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller perdura.spec

      # ── Archive ────────────────────────────────────────────────────
      - name: Archive (Linux / macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.archive_cmd }} ${{ matrix.zip_name }} -C dist Perdura

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\Perdura -DestinationPath ${{ matrix.zip_name }}

      # ── Upload build artifact ──────────────────────────────────────
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Perdura ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            Perdura-linux-x64.tar.gz
            Perdura-windows-x64.zip
            Perdura-macos-arm64.tar.gz
