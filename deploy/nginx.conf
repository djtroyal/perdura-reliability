# Perdura reverse proxy — nginx alternative to Caddy (deploy/Caddyfile).
#
# nginx does not do automatic TLS, so obtain a certificate separately, e.g.:
#   certbot certonly --standalone -d perdura.example.com
# and point ssl_certificate/ssl_certificate_key at the issued files below.
#
# Create the basic-auth credential file:
#   htpasswd -cB /etc/nginx/.htpasswd yourusername
#
# As with Caddy, this proxy is the only access control in front of the open
# app — keep the app container unpublished and reachable only from nginx.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name perdura.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name perdura.example.com;

    ssl_certificate     /etc/letsencrypt/live/perdura.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perdura.example.com/privkey.pem;

    # Authentication (the app has none of its own).
    auth_basic           "Perdura";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Large compute responses; give slow analyses room to finish.
    client_max_body_size 25m;
    proxy_read_timeout   120s;

    # One origin for the SPA and /api — the app serves both.
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
