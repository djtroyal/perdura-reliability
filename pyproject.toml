[build-system]
requires = ["setuptools>=83.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "reliability"
version = "0.3.2"
description = "A comprehensive reliability engineering suite for Python"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.21",
    "scipy>=1.18.0",
    "matplotlib>=3.4",
    "pandas>=1.3",
]

[project.optional-dependencies]
dev = ["pytest>=9.1.1", "pytest-cov"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
